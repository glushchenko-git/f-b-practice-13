<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <title>Список дел</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            padding: 30px 24px;
            color: white;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            background: rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 40px;
        }

        .stats span {
            font-weight: bold;
            font-size: 20px;
            margin-left: 6px;
        }

        .content {
            padding: 24px;
        }

        .form {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .form input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 40px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .form input:focus {
            border-color: #6366f1;
        }

        .form button {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .form button:hover {
            transform: scale(1.02);
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            background: #f9fafb;
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .todo-item:hover {
            background: #f3f4f6;
        }

        .todo-text {
            font-size: 16px;
            color: #1f2937;
        }

        .todo-text.completed {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: #6366f1;
        }

        .todo-left {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .delete-btn:hover {
            background: #fee2e2;
        }

        .empty {
            text-align: center;
            padding: 48px;
            color: #9ca3af;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            font-size: 12px;
            color: #9ca3af;
            border-top: 1px solid #f3f4f6;
        }

        .install-btn {
            background: #10b981;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            display: none;
        }

        .install-btn:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>📝 Список дел</h1>
                <p>Управляй задачами, даже без интернета</p>
                <div class="stats">
                    <div>📋 Всего: <span id="total">0</span></div>
                    <div>✅ Выполнено: <span id="completed">0</span></div>
                </div>
            </div>
            <div class="content">
                <div class="form">
                    <input type="text" id="todoInput" placeholder="Напиши новую задачу..." autocomplete="off">
                    <button id="addBtn">+ Добавить</button>
                </div>
                <ul id="todoList" class="todo-list"></ul>
                <button id="installBtn" class="install-btn">📱 Установить приложение</button>
                <div class="status" id="status">🔄 Статус: загрузка...</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
