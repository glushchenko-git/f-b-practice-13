<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Мета-теги для Android/Chrome -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2ecc71">
    
    <!-- Мета-теги для iOS (Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Задачи">
    <link rel="apple-touch-icon" href="/icons/icon-152x152.png">
    
    <!-- Фавикон -->
    <link rel="icon" href="/icons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
    
    <title>Мои задачи | PWA</title>
    
    <!-- CSS фреймворк -->
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    
    <style>
        body {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #todo-form {
            margin-bottom: 20px;
        }
        #todo-list {
            list-style: none;
            padding: 0;
        }
        #todo-list li {
            background: #f4f4f4;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background-color: #ff4757;
        }
        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            color: #777;
        }
        .install-btn-container {
            text-align: center;
            margin-top: 10px;
        }
        .install-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
        }
        .install-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    <h1>📝 Список дел</h1>
    <p>Приложение работает офлайн. Данные сохраняются в localStorage.</p>

    <form id="todo-form" class="row">
        <input class="col-9" type="text" id="todo-input" placeholder="Введите новую задачу..." required>
        <button class="col-3" type="submit">Добавить</button>
    </form>

    <ul id="todo-list"></ul>
    
    <div class="install-btn-container" id="install-container" style="display: none;">
        <button class="install-btn" id="install-btn">📱 Установить приложение</button>
    </div>
    
    <div class="status" id="status">Статус: Загрузка...</div>

    <script src="app.js"></script>
</body>
</html>
